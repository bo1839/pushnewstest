<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻简报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .date { color: #888; font-size: 14px; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 14px;
        }
        .tab.active {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
        }
        
        .news-section { display: none; }
        .news-section.active { display: block; }
        
        .news-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .news-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0,210,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .news-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .news-card .category {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 12px;
            font-size: 12px;
            color: white;
            margin-bottom: 12px;
        }
        .news-card .title {
            font-size: 18px;
            color: white;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .news-card .source {
            font-size: 12px;
            color: #666;
        }
        
        .history-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .history-section h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .history-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .history-item a {
            text-decoration: none;
            color: #888;
            font-size: 14px;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 每日新闻简报</h1>
            <p class="date" id="current-date"></p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('all')">全部</button>
            <button class="tab" onclick="showTab('AI')">🤖 AI</button>
            <button class="tab" onclick="showTab('科技')">💻 科技</button>
            <button class="tab" onclick="showTab('创投')">💰 创投</button>
        </div>
        
        <div id="news-container">
            <p style="color:#888;text-align:center;padding:40px;">正在加载今日新闻...</p>
        </div>
        
        <div class="history-section">
            <h3>📚 历史消息</h3>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>
    
    <script>
        // 设置当前日期
        const today = new Date();
        const dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
        document.getElementById('current-date').textContent = dateStr + ' • 每日更新';
        
        // 加载历史索引
        fetch('index.json')
            .then(r => r.json())
            .then(history => {
                const list = document.getElementById('history-list');
                history.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<a href="${item.url}">${item.date}</a>`;
                    list.appendChild(div);
                });
            });
        
        // 加载今日报告
        fetch('report_' + dateStr + '.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('news-container').innerHTML = html.match(/<div id="news-container">([\s\S]*?)<\/div>\s*<div class="history-section">/)[1];
            })
            .catch(() => {
                document.getElementById('news-container').innerHTML = '<p style="color:#888;text-align:center;padding:40px;">暂无今日新闻</p>';
            });
        
        function showTab(category) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.news-section').forEach(s => {
                if (category === 'all') {
                    s.style.display = 'block';
                } else {
                    s.style.display = s.dataset.category === category ? 'block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
